services:
  # Backend API
  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - AI_PROVIDER=gemini
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DEBUG=${DEBUG:-false}
    depends_on:
      - redis
    # Source bind-mounts intentionally absent: this file is the
    # production-shaped compose (see docs/adrs/0012). For local
    # iteration with hot-reload, run `make dev-backend` directly.
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # Frontend
  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    # Source bind-mounts intentionally absent (see backend service).
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # Redis for caching and rate limiting
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # Redis Streams worker (generation job queue consumer)
  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    command: ["sh", "-c", "cd /app/backend && python -m app.worker"]
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - AI_PROVIDER=gemini
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - redis
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # m11-pr44: L2 sandbox sidecar. OFF by default (opt-in via the
  # ``l2-sandbox`` profile). Backend points at this container by
  # setting ``FF_TOOL_L2_GRPC_TARGET=tool-runner:50051`` and
  # ``FF_TOOL_L2_GRPC_ENABLED=1``. With the profile inactive the
  # backend's L2 sandbox uses its own in-process server (default
  # FF_TOOL_L2_GRPC_TARGET=inproc) when the flag is on, or raises
  # SandboxNotImplemented when the flag is off.
  tool-runner:
    profiles: ["l2-sandbox"]
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    command: ["python", "-m", "ai_engine.registry.run_l2_sandbox"]
    environment:
      - L2_SANDBOX_HOST=0.0.0.0
      - L2_SANDBOX_PORT=50051
    expose:
      - "50051"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

volumes:
  redis_data:
  uploads:

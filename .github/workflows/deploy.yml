name: Deploy

on:
  # Only deploy after CI passes — never deploy a broken commit.
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

# Prevent concurrent deploys; queue new ones so they do not stomp each other.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── Guard ─────────────────────────────────────────────────────────
  # Abort the entire deploy run immediately when CI did not succeed.
  ci-gate:
    name: CI must be green
    runs-on: ubuntu-latest
    steps:
      - name: Check CI conclusion
        run: |
          conclusion="${{ github.event.workflow_run.conclusion }}"
          sha="${{ github.event.workflow_run.head_sha }}"
          echo "CI conclusion: ${conclusion} (sha: ${sha})"
          if [ "${conclusion}" != "success" ]; then
            echo "FAIL: CI workflow concluded with '${conclusion}' — deploy aborted."
            exit 1
          fi
          echo "PASS: CI is green — proceeding with deploy."

  # ── Backend ───────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Railway)
    runs-on: ubuntu-latest
    needs: ci-gate
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the exact SHA that CI passed, not whatever HEAD is now.
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Validate required secrets are present
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          missing=0
          if [ -z "${RAILWAY_TOKEN}" ]; then
            echo "FAIL: RAILWAY_TOKEN secret is not set — add it at Settings → Secrets → Actions"
            missing=$((missing+1))
          fi
          if [ "${missing}" -gt 0 ]; then
            echo "Aborting: ${missing} required secret(s) missing."
            exit 1
          fi
          echo "PASS: All backend deploy secrets present."

      - name: Install Railway CLI
        run: npm install -g @railway/cli@4.37.4

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Deploying SHA ${{ github.event.workflow_run.head_sha }} to Railway backend service..."
          railway up --service=backend --detach
          echo "Deploy command issued — waiting for health check to confirm."

      - name: Wait for backend health check
        # Retry every 10 s for up to 3 min (18 attempts) before failing.
        # Tries the custom domain first, then the Railway-assigned URL.
        run: |
          MAX_RETRIES=18
          SLEEP_S=10
          URLS=(
            "https://api.hirestack.tech/health"
            "https://hirestack-production.up.railway.app/health"
          )

          attempt=0
          while [ "${attempt}" -lt "${MAX_RETRIES}" ]; do
            attempt=$((attempt+1))
            echo "Health check attempt ${attempt}/${MAX_RETRIES}..."
            for url in "${URLS[@]}"; do
              status_code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${url}" || echo "000")
              echo "  ${url} → HTTP ${status_code}"
              if [ "${status_code}" = "200" ]; then
                echo "PASS: Backend is healthy at ${url}"
                exit 0
              fi
            done
            if [ "${attempt}" -lt "${MAX_RETRIES}" ]; then
              echo "  Not ready yet — sleeping ${SLEEP_S}s..."
              sleep "${SLEEP_S}"
            fi
          done

          echo "FAIL: Backend health check failed after $((MAX_RETRIES * SLEEP_S))s — investigate before promoting frontend."
          echo "Check Railway logs: railway logs --service=backend"
          exit 1

  # ── Frontend ──────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Netlify)
    runs-on: ubuntu-latest
    needs: deploy-backend
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Validate required secrets are present
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: |
          missing=0
          for var in NETLIFY_AUTH_TOKEN NETLIFY_SITE_ID NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY NEXT_PUBLIC_API_URL; do
            if [ -z "${!var}" ]; then
              echo "FAIL: ${var} secret is not set"
              missing=$((missing+1))
            fi
          done
          if [ "${missing}" -gt 0 ]; then
            echo "Aborting: ${missing} required secret(s) missing."
            exit 1
          fi
          echo "PASS: All frontend deploy secrets present."

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
        run: npm run build

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        # netlify.toml sets publish = ".next"; @netlify/plugin-nextjs handles SSR routing.
        run: npx netlify-cli@24.11.3 deploy --prod --dir=.next --message="SHA ${{ github.event.workflow_run.head_sha }}"

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── CI gate ───────────────────────────────────────────
  ci:
    uses: ./.github/workflows/ci.yml

  # ── Backend → Railway ─────────────────────────────────
  deploy-backend:
    name: "Backend → Railway"
    needs: ci
    runs-on: ubuntu-latest
    environment: hirestack-ai / production
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service hirestack-ai --detach

      - name: Health check
        run: |
          sleep 30
          for i in $(seq 1 12); do
            HTTP=$(curl -sf -o /dev/null -w "%{http_code}" https://api.hirestack.tech/health 2>/dev/null || echo "000")
            if [ "$HTTP" = "200" ]; then
              echo "::notice::Backend healthy — https://api.hirestack.tech/health"
              exit 0
            fi
            echo "Attempt $i/12 — HTTP $HTTP, retrying in 15s…"
            sleep 15
          done
          echo "::error::Backend health check failed after 3 minutes"
          exit 1

  # ── Frontend → Netlify (auto-deploy, verify only) ─────
  verify-frontend:
    name: "Frontend → Netlify"
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        run: |
          sleep 90
          for i in $(seq 1 12); do
            HTTP=$(curl -sf -o /dev/null -w "%{http_code}" https://hirestack-ai.netlify.app/ 2>/dev/null || echo "000")
            if [ "$HTTP" = "200" ]; then
              echo "::notice::Frontend live — https://hirestack-ai.netlify.app"
              exit 0
            fi
            echo "Attempt $i/12 — HTTP $HTTP, retrying in 15s…"
            sleep 15
          done
          echo "::error::Frontend did not respond within 4.5 minutes"
          exit 1

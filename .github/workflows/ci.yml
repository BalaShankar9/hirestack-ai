name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

jobs:
  # ── Frontend ──────────────────────────────────────────
  frontend:
    name: Frontend (lint + build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

      - name: Test
        run: npm test -- --passWithNoTests 2>/dev/null || true

  # ── Backend ───────────────────────────────────────────
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - name: Lint
        run: |
          pip install ruff
          ruff check . --select E,W,F --ignore E501

      - name: Test
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          DEBUG: "false"
          ENVIRONMENT: test
        run: |
          pip install pytest pytest-asyncio httpx
          python -m pytest tests/ -v --tb=short 2>/dev/null || echo "No tests yet"

  # ── Security ──────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets
        run: |
          if grep -rn 'sk-proj-\|AKIA\|ghp_\|ghu_' --include='*.py' --include='*.ts' --include='*.tsx' --include='*.js' --include='*.json' . 2>/dev/null | grep -v node_modules | grep -v '.env.example'; then
            echo "Possible secrets found in source code"
            exit 1
          fi
          echo "No secrets found in source code"

      - name: Check .env files not committed
        run: |
          if git ls-files | grep -E '^(backend|frontend)/\.env$'; then
            echo ".env file is tracked by git"
            exit 1
          fi
          echo ".env files are properly gitignored"

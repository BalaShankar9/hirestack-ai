name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

jobs:
  # ── Frontend ──────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Lint
        run: npx next lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key-for-ci-build
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

      - name: Unit tests
        run: npm test

  # ── Backend ───────────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Lint
        run: |
          pip install -q ruff
          ruff check backend/ ai_engine/

      - name: Test
        working-directory: backend
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder-key-for-ci
          SUPABASE_SERVICE_ROLE_KEY: placeholder-key-for-ci
          SUPABASE_JWT_SECRET: placeholder-secret-for-ci
          DEBUG: "false"
          ENVIRONMENT: test
        run: python -m pytest tests/ -v --tb=short -q

  # ── Security ──────────────────────────────────────────
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for hardcoded secrets
        run: |
          FOUND=$(grep -rn 'sk-proj-\|AKIA[A-Z0-9]\{16\}\|ghp_[A-Za-z0-9]\{36\}\|ghu_[A-Za-z0-9]\{36\}' \
            --include='*.py' --include='*.ts' --include='*.tsx' --include='*.js' --include='*.json' \
            . 2>/dev/null | grep -v node_modules | grep -v '.env.example' || true)
          if [ -n "$FOUND" ]; then
            echo "::error::Hardcoded secrets detected in source code"
            echo "$FOUND"
            exit 1
          fi

      - name: Verify .env files not tracked
        run: |
          if git ls-files --error-unmatch .env backend/.env frontend/.env.local 2>/dev/null; then
            echo "::error::.env file is tracked by git"
            exit 1
          fi

  # ── Dependency vulnerability scan ─────────────────────
  # Advisory: surfaces known CVEs but does NOT fail the build, so a
  # zero-day disclosure can't block a hotfix. Promote to required once
  # the baseline is clean and we have a patch SLA in place.
  deps-audit:
    name: Dependency CVE scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: pip-audit (backend)
        run: |
          pip install -q pip-audit
          pip-audit -r backend/requirements.txt --strict || true

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm audit (frontend, prod deps only)
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high || true

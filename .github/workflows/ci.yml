name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch (saves CI minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

jobs:
  # ── Frontend ──────────────────────────────────────────
  frontend:
    name: Frontend (lint + typecheck + build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        env:
          # Supabase values are checked at init time; provide placeholders so the
          # lint step itself does not fail on missing env vars.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run lint -- --max-warnings=0

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

      - name: Test
        # Run tests and surface failures — only skip when there are literally no test files yet.
        run: npm test -- --reporter=verbose --passWithNoTests

  # ── Backend ───────────────────────────────────────────
  backend:
    name: Backend (lint + typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install dev tooling
        run: pip install ruff mypy pytest pytest-asyncio httpx

      - name: Lint (ruff)
        run: ruff check . --select E,W,F --ignore E501

      - name: Static type check (mypy — regression guard)
        # Soft cap: fails CI if mypy error count GROWS beyond ~110 pre-existing errors.
        # Prevents new type regressions from silently shipping while we resolve existing ones.
        # Remove the count gate and set --strict once all ~110 baseline errors are fixed.
        run: |
          set +e
          MYPY_OUT=$(mypy app/ --ignore-missing-imports --no-strict-optional \
            --check-untyped-defs --no-error-summary 2>&1)
          ERROR_COUNT=$(echo "$MYPY_OUT" | grep -c ': error:' || true)
          echo "mypy errors: ${ERROR_COUNT} (baseline ≈110, hard cap: 120)"
          echo "$MYPY_OUT" | tail -6
          if [ "${ERROR_COUNT}" -gt 120 ]; then
            echo "FAIL: mypy error count (${ERROR_COUNT}) exceeds cap (120). Fix new type errors."
            exit 1
          fi

      - name: Test
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          SUPABASE_JWT_SECRET: placeholder_jwt_secret_for_ci
          GEMINI_API_KEY: placeholder
          DEBUG: "false"
          ENVIRONMENT: test
        run: python -m pytest tests/ -v --tb=short -q --ignore=tests/e2e

  # ── Database Schema Check ─────────────────────────────
  database:
    name: Database Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate SQL migration files exist and are non-empty
        run: |
          MIGRATION_DIR="supabase/migrations"
          count=0
          errors=0
          for f in "$MIGRATION_DIR"/*.sql; do
            [ -f "$f" ] || continue
            count=$((count + 1))
            # File must not be empty
            if [ ! -s "$f" ]; then
              echo "ERROR: Empty migration file: $f"
              errors=$((errors + 1))
            fi
            # File name must match timestamp pattern YYYYMMDDHHMMSS_name.sql
            basename=$(basename "$f")
            if ! echo "$basename" | grep -qE '^[0-9]{14}_[a-z0-9_]+\.sql$'; then
              echo "WARNING: Migration filename does not follow convention: $basename"
            fi
            # Check for basic SQL keywords (CREATE TABLE, ALTER TABLE, INSERT, etc.)
            if ! grep -qiE '(create|alter|insert|drop|update|grant|revoke|do \$\$)' "$f"; then
              echo "WARNING: Migration $basename has no recognisable SQL statements"
            fi
          done
          echo "Migration files checked: $count"
          if [ "$errors" -gt 0 ]; then
            echo "Migration validation failed with $errors error(s)"
            exit 1
          fi
          echo "All migration files passed validation"

      - name: Check migrations are in chronological order
        run: |
          prev=""
          for f in supabase/migrations/*.sql; do
            [ -f "$f" ] || continue
            curr=$(basename "$f" | cut -d_ -f1)
            if [ -n "$prev" ] && [ "$curr" -lt "$prev" ]; then
              echo "ERROR: Migration out of order: $f (timestamp $curr < previous $prev)"
              exit 1
            fi
            prev="$curr"
          done
          echo "Migration order is correct"

  # ── Security ──────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for accidental secrets in source code
        run: |
          # Skip node_modules, .env.example, and test fixtures
          if git ls-files | xargs grep -lnE 'sk-proj-[a-zA-Z0-9]{20,}|AKIA[A-Z0-9]{16}|ghp_[a-zA-Z0-9]{36}|ghu_[a-zA-Z0-9]{36}|AIza[0-9A-Za-z\-_]{35}' 2>/dev/null \
            | grep -v '\.env\.example$' \
            | grep -v '/__tests__/' \
            | grep -v '/test/' \
            | grep -v '/tests/'; then
            echo "FAIL: Possible API key / secret found in tracked files"
            exit 1
          fi
          echo "PASS: No secrets detected in source code"

      - name: Check .env files are not committed
        run: |
          if git ls-files | grep -E '^(backend|frontend)/\.env$'; then
            echo "FAIL: .env file is tracked by git — never commit real secrets"
            exit 1
          fi
          echo "PASS: .env files are properly git-ignored"

      - name: Verify .env.example files exist
        run: |
          for dir in backend frontend; do
            if [ ! -f "$dir/.env.example" ]; then
              echo "FAIL: Missing $dir/.env.example — developers need this template"
              exit 1
            fi
          done
          echo "PASS: .env.example files present"

      - name: Check Dockerfile security
        run: |
          found=0
          for f in $(find . -name 'Dockerfile' -not -path '*/node_modules/*'); do
            if grep -q 'USER root' "$f"; then
              echo "WARNING: $f runs as root — consider adding a non-root USER"
              found=1
            fi
          done
          if [ "$found" -eq 0 ]; then
            echo "PASS: No Dockerfiles run as root"
          fi

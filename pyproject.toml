[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "W", "F", "TID"]
ignore = ["E501", "F841"]

[tool.ruff.lint.per-file-ignores]
"**/__init__.py" = ["F401"]
"ai_engine/**" = ["TID251"]
"backend/tests/**" = ["TID251"]
# TODO(m4-pr12+): migrate these to ai_engine.api and drop the exemption.
# Currently dirty (uncommitted work) — coordinated cleanup deferred.
"backend/app/api/routes/analytics.py" = ["TID251"]
"backend/app/api/routes/generate/stream.py" = ["TID251"]
"backend/app/services/pipeline_runtime.py" = ["TID251"]
"ai_engine/agents/tools.py" = ["E402"]
"ai_engine/client.py" = ["E402"]

[tool.ruff.lint.flake8-tidy-imports.banned-api]
# PR m4-pr11: backend code must consume ai_engine via the narrow `ai_engine.api`
# surface. Deep imports lock us into ai_engine internals and balloon the
# refactor blast-radius. Tests and ai_engine itself are exempt above.
"ai_engine.client".msg = "Import from ai_engine.api instead"
"ai_engine.model_router".msg = "Import from ai_engine.api instead"
"ai_engine.agent_events".msg = "Import from ai_engine.api instead"

[tool.ruff.lint.isort]
known-first-party = ["backend", "ai_engine"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["backend/tests"]

# ── Coverage gate (m12-pr02, TD-2) ──────────────────────────────────────
# Same ratchet pattern as the mypy strict allowlist (TD-1, m12-pr01):
# scope coverage to the modules that already meet the 70% bar; widen
# `source` one PR at a time. CI invokes this via the architecture
# workflow with `--cov-fail-under=70`.
#
# Local:
#   .venv/bin/python -m pytest ai_engine/tests \
#       --cov-config=pyproject.toml --cov-fail-under=70
[tool.coverage.run]
branch = false
source = [
    "ai_engine.api",
    "ai_engine.registry",
]
omit = [
    # __main__ entrypoint sidecar; exercised via container, not unit tests.
    "ai_engine/registry/run_l2_sandbox.py",
    "ai_engine/tests/*",
]

[tool.coverage.report]
# Fail-under is set on the CLI (--cov-fail-under=70) so dev runs without
# the flag still print the report without exiting non-zero.
show_missing = true
skip_covered = false
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
]

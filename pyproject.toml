[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "W", "F"]
ignore = ["E501", "F841"]

[tool.ruff.lint.per-file-ignores]
"**/__init__.py" = ["F401"]
"ai_engine/agents/tools.py" = ["E402"]
"ai_engine/client.py" = ["E402"]

[tool.ruff.lint.isort]
known-first-party = ["backend", "ai_engine"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["backend/tests"]

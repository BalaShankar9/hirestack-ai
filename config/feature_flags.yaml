# Feature-flag registry.
#
# Source of truth for every runtime feature flag. Enforced by
# scripts/governance/check_feature_flags.py and the architecture CI workflow.
#
# Required fields per flag:
#   owner    — GitHub handle, on-call DRI for the flag's behaviour
#   created  — ISO date the flag was introduced (YYYY-MM-DD)
#   sunset   — ISO date the flag MUST be removed by (YYYY-MM-DD)
#   default  — true | false | "off" | "on"
#   purpose  — one-line rationale; what does flipping it actually do
#
# Lifecycle rules:
#   1. New flag => add entry in same PR that introduces the code reference.
#   2. Sunset is mandatory; pick a date you're prepared to defend.
#   3. Past sunset by 14 days => CI fails. Either remove the flag or extend (with reason in PR).
#   4. Removing a flag => delete entry AND all code references in same PR.

flags:
  ff_temporal_generation:
    owner: BalaShankar9
    created: 2026-04-15
    sunset: 2026-09-30
    default: false
    purpose: Route generation jobs through the PR-24 outer Temporal envelope.

  ff_tool_registry:
    owner: BalaShankar9
    created: 2026-03-01
    sunset: 2026-08-31
    default: false
    purpose: Use the new declarative tool registry for agent dispatch.

  # Reserved (not yet introduced in code, listed so M7 PRs can find them):

  ff_queue_ack_on_success:
    owner: BalaShankar9
    created: 2026-05-08
    sunset: 2026-09-01
    default: false
    purpose: ACK Redis Stream messages only after handler returns success (P0-3 / M7-C).

  ff_temporal_per_stage:
    owner: BalaShankar9
    created: 2026-05-08
    sunset: 2026-12-01
    default: false
    purpose: Use per-stage Temporal activities instead of single-envelope generation workflow (P1-1 / M9).

  ff_inprocess_fallback:
    owner: BalaShankar9
    created: 2026-05-08
    sunset: 2026-08-31
    default: false
    purpose: Allow generation jobs to fall back to in-process execution when Redis is unavailable. Production MUST keep this OFF (ADR-0038, P0-2). Dev/single-process deploys may flip ON; in that case execution is bounded by inprocess_max_concurrent.

  # ── Discovered in code at governance-machinery rollout (2026-05-08).
  # All registered with sunset dates so the lifecycle audit catches drift.

  ff_aim_rag:
    owner: BalaShankar9
    created: 2026-04-25
    sunset: 2026-08-31
    default: false
    purpose: Enable retrieval-augmented context for AIM (Application Intelligence Module) flows.

  ff_event_consumer:
    owner: BalaShankar9
    created: 2026-04-20
    sunset: 2026-09-30
    default: false
    purpose: Enable the post-outbox event consumer pipeline (M7-C dependency).

  ff_outbox_relay:
    owner: BalaShankar9
    created: 2026-04-20
    sunset: 2026-09-30
    default: false
    purpose: Run the outbox relay worker that drains outbox_events into the durable bus.

  ff_strict_critic_gate:
    owner: BalaShankar9
    created: 2026-04-25
    sunset: 2026-08-31
    default: false
    purpose: Enforce strict critic-gate review on agent outputs before persistence.

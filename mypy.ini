# m12-pr01: typing strict allowlist for ai_engine.
#
# Strategy: keep mypy lenient by default, then opt modules in to
# ``strict = True`` once they are demonstrably typed. New PRs that
# add modules to the allowlist are mechanically obvious; the floor
# can only ratchet upward. Closes TD-1 (initial scope).
#
# To run locally:
#   .venv/bin/mypy --explicit-package-bases ai_engine
#
# CI runs the same command in .github/workflows/architecture.yml.

[mypy]
python_version = 3.11
# follow_imports=silent lets us check just the allowlisted modules
# without bleeding errors from un-typed siblings (agents/, chains/, ...).
follow_imports = silent
ignore_missing_imports = True
warn_unused_configs = True
namespace_packages = True
explicit_package_bases = True
# Sane defaults for non-strict modules; strict ones override below.
warn_unused_ignores = True
warn_redundant_casts = True

# ---- strict allowlist ---------------------------------------------------
# Modules below MUST type-check under ``--strict``. Adding a module here
# is the one-line ratchet for TD-1. Removing one requires a written
# justification in the PR body.

[mypy-ai_engine.api]
strict = True

[mypy-ai_engine.registry.*]
strict = True

# ---- non-allowlisted ai_engine modules ---------------------------------
# Don't fail the build for these yet, but keep mypy parsing them so we
# get an honest baseline error count when we widen the allowlist.

[mypy-ai_engine.agents.*]
ignore_errors = True

[mypy-ai_engine.chains.*]
ignore_errors = True

[mypy-ai_engine.evals.*]
ignore_errors = True

[mypy-ai_engine.observability.*]
ignore_errors = True

[mypy-ai_engine.rag.*]
ignore_errors = True

[mypy-ai_engine.tools.*]
ignore_errors = True

[mypy-ai_engine.client]
ignore_errors = True

[mypy-ai_engine.model_router]
ignore_errors = True

[mypy-ai_engine.agent_events]
ignore_errors = True

[mypy-ai_engine.application_brief]
ignore_errors = True

[mypy-ai_engine.cache]
ignore_errors = True

# ---- backend & tests are out of scope for TD-1 -------------------------

[mypy-backend.*]
ignore_errors = True

[mypy-ai_engine.tests.*]
ignore_errors = True

# ---- third-party stub gaps ---------------------------------------------
# grpc ships partial stubs; ignore_missing_imports is global above so
# we don't need per-package stanzas until a real stub conflict appears.

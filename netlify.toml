[build]
  base = "frontend"
  command = "npm ci && npm run build"
  publish = ".next"

[build.environment]
  # NEXT_PUBLIC_SUPABASE_URL and NEXT_PUBLIC_SUPABASE_ANON_KEY must be set in
  # Netlify dashboard → Site settings → Environment variables.
  # DO NOT hardcode secrets here — this file is committed to version control.
  # NEXT_PUBLIC_API_URL must also be set in Netlify dashboard environment variables.
  NEXT_PUBLIC_AI_ENABLED = "true"
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

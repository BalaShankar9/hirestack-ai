[build]
  base = "frontend"
  command = "npm ci && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  # NEXT_PUBLIC_* vars are set in Netlify dashboard.
  # This fallback ensures builds work even without dashboard config.
  NEXT_PUBLIC_API_URL = "https://hirestack-ai-production.up.railway.app"
  NEXT_PUBLIC_AI_ENABLED = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Routing is handled by the Next.js adapter — no SPA fallback needed

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[build]
  base = "frontend"
  command = "npm ci && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  # NEXT_PUBLIC_* vars are set in Netlify dashboard.
  # This fallback ensures builds work even without dashboard config.
  NEXT_PUBLIC_API_URL = "https://api.hirestack.tech"
  NEXT_PUBLIC_AI_ENABLED = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# SPA fallback — let Next.js handle all routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Role = ["admin"]}

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
